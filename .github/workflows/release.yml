# 在打 tag（如 v1.0.0）时构建 Release，并用 PyInstaller 生成多平台二进制
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-amd64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm mischicat_bot.spec

      - name: Pack artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cp .env.example dist/.env.example
          cd dist
          zip ../mischicat-bot-${{ matrix.name }}.zip mischicat-bot .env.example
          cd ..

      - name: Pack artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item .env.example dist\.env.example
          Compress-Archive -Path dist\mischicat-bot.exe, dist\.env.example -DestinationPath mischicat-bot-${{ matrix.name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mischicat-bot-${{ matrix.name }}
          path: mischicat-bot-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name '*.zip' -exec cp {} release/ \;
          ls -la release/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
