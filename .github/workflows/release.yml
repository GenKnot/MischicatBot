name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-amd64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm mischicat_bot.spec

      - name: Prepare artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cp .env.example dist/.env

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item .env.example dist\.env

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: mischicat-bot-${{ matrix.name }}
          path: |
            dist/mischicat-bot
            dist/.env
          include-hidden-files: true

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mischicat-bot-${{ matrix.name }}
          path: |
            dist/mischicat-bot.exe
            dist/.env
          include-hidden-files: true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          cd artifacts/mischicat-bot-linux-amd64
          zip ../../release/mischicat-bot-linux-amd64.zip mischicat-bot .env
          cd ../..

          cd artifacts/mischicat-bot-windows-amd64
          zip ../../release/mischicat-bot-windows-amd64.zip mischicat-bot.exe .env
          cd ../..

          ls -la release/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
