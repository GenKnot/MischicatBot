name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/mischicat-bot" >> $GITHUB_ENV

      - name: Get timestamp tag
        id: get_tag
        run: echo "tag=alpha$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.get_tag.outputs.tag }}
          file: Dockerfile


      - name: Update image tags in GitOps repo
        if: github.event_name == 'push'
        run: |
          # Clone the GitOps repository
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/yulexun/flux.git gitops
          cd gitops

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Install yq for YAML manipulation
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          # Update the Mischicat-Bot image tag in the correct deployment file
          yq e ".spec.template.spec.containers[0].image = \"${{ env.IMAGE }}:${{ steps.get_tag.outputs.tag }}\"" -i clusters/home/mischicat/deployment.yaml

          # Commit and push changes
          git add clusters/home/mischicat/deployment.yaml
          git commit -m "Update Mischicat-Bot image tag to ${{ steps.get_tag.outputs.tag }}" || exit 0
          git push