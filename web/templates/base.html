<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mischicat Admin{% endblock %}</title>
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mischicat">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
  <link rel="stylesheet" href="/static/style.css?v=2">
  <style>
    /* ── Sidebar bottom area (version + PWA install) ──────────────── */
    .sidebar-install {
      margin-top: auto;
      padding: 10px 12px 8px;
      border-top: 1px solid var(--border);
    }

    .sidebar-version {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 2px 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .sidebar-version-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      flex-shrink: 0;
    }

    .sidebar-version-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(124, 106, 247, .12);
      border: 1px solid rgba(124, 106, 247, .25);
      border-radius: 99px;
      padding: 1px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    #pwaInstallBtn {
      display: none;
      width: 100%;
      padding: 8px 12px;
      background: rgba(78, 205, 196, .12);
      border: 1px solid rgba(78, 205, 196, .3);
      border-radius: 7px;
      color: var(--accent2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background .15s, border-color .15s;
      line-height: 1.4;
    }

    #pwaInstallBtn:hover {
      background: rgba(78, 205, 196, .22);
      border-color: var(--accent2);
    }

    #pwaInstalledMsg {
      display: none;
      padding: 7px 10px;
      background: rgba(34, 197, 94, .1);
      border: 1px solid rgba(34, 197, 94, .25);
      border-radius: 7px;
      color: var(--success);
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    #pwaIosHint {
      display: none;
      padding: 8px 10px;
      background: rgba(78, 205, 196, .08);
      border: 1px solid rgba(78, 205, 196, .2);
      border-radius: 7px;
      color: var(--accent2);
      font-size: 11px;
      line-height: 1.6;
    }

    #pwaIosHint strong {
      color: var(--text);
    }
  </style>
</head>
<body>
<div class="layout">
  <button class="nav-toggle" id="navToggle" aria-label="菜单">☰</button>
  <div class="nav-overlay" id="navOverlay"></div>
  <nav id="sidebar">
    <a href="/" class="brand">🐱 Mischicat</a>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>总览</a>
    <a href="/players" {% if request.url.path.startswith("/players") %}class="active"{% endif %}>修士</a>
    <a href="/events" {% if request.url.path == "/events" %}class="active"{% endif %}>公共事件</a>
    <a href="/items" {% if request.url.path == "/items" %}class="active"{% endif %}>物品图鉴</a>
    <a href="/techniques" {% if request.url.path == "/techniques" %}class="active"{% endif %}>功法大全</a>
    <a href="/stats" {% if request.url.path == "/stats" %}class="active"{% endif %}>属性榜</a>
    <a href="/equipment-preview" {% if request.url.path == "/equipment-preview" %}class="active"{% endif %}>装备预览</a>
    <a href="/dead" {% if request.url.path == "/dead" %}class="active"{% endif %}>已坐化</a>
    <a href="/world" {% if request.url.path == "/world" %}class="active"{% endif %}>世界</a>

    <!-- ── Sidebar bottom: version + PWA install ── -->
    <div class="sidebar-install">

      <!-- Version badge -->
      <div class="sidebar-version">
        <span class="sidebar-version-label">版本</span>
        <span class="sidebar-version-badge" title="{{ app_version }}">{{ app_version }}</span>
      </div>

      <!-- Chrome / Edge / Android: native install prompt -->
      <button id="pwaInstallBtn" title="安装为独立应用">
        ⬇ 安装应用
      </button>

      <!-- Shown briefly after a successful install -->
      <div id="pwaInstalledMsg">✓ 已安装</div>

      <!-- iOS Safari: no beforeinstallprompt, show manual instructions -->
      <div id="pwaIosHint">
        📲 安装：点击底栏 <strong>分享</strong>，选择<br>
        <strong>添加到主屏幕</strong>
      </div>
    </div>
  </nav>
  <main class="main-content">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
<script>
  const toggle = document.getElementById('navToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('navOverlay');
  toggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }

  // ── PWA install prompt ─────────────────────────────────────────────
  const installBtn   = document.getElementById('pwaInstallBtn');
  const installedMsg = document.getElementById('pwaInstalledMsg');
  const iosHint      = document.getElementById('pwaIosHint');

  let deferredPrompt = null;

  // Chrome / Edge / Samsung Internet: capture the deferred prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });

  // User clicks the install button
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
    if (outcome === 'accepted') {
      installedMsg.style.display = 'block';
      setTimeout(() => { installedMsg.style.display = 'none'; }, 3000);
    }
  });

  // Hide after the OS reports a successful install
  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    installBtn.style.display = 'none';
    installedMsg.style.display = 'block';
    setTimeout(() => { installedMsg.style.display = 'none'; }, 3000);
  });

  // iOS Safari: no beforeinstallprompt — show manual instructions
  // unless the page is already running in standalone mode
  const isIos        = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true
                    || window.matchMedia('(display-mode: standalone)').matches;
  if (isIos && !isStandalone) {
    iosHint.style.display = 'block';
  }
</script>
</body>
</html>
